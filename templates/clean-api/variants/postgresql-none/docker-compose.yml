services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_DB: sample_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"

  api:
    build:
      context: .
      dockerfile: src/Company.SampleService.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      - postgresql
      - seq
    ports:
      - "8080:8080"
