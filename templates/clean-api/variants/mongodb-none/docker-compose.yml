services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"

  api:
    build:
      context: .
      dockerfile: src/Company.SampleService.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      - mongodb
      - seq
    ports:
      - "8080:8080"
